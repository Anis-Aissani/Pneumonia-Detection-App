# PneumoScan — Orchestration des services
#
# Services :
#   backend  — API FastAPI (port 8000)
#   frontend — Interface Vue.js servie par Nginx (publiee sur le port 3000)
#
# Volumes persistants :
#   ./data      — base de données SQLite (predictions.db)
#   ./heatmaps  — cartes d'attention HOG générées
#   ./backend/model — modèle HOG+SVM pré-entraîné

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pneumoscan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./heatmaps:/app/heatmaps
      - ./backend/model:/app/model:ro   # Lecture seule : le modèle ne doit pas être modifié
    environment:
      - DB_PATH=/app/data/predictions.db
      - HEATMAP_DIR=/app/heatmaps
      - MODEL_PATH=/app/model/pneumonia_effnet_svm.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pneumoscan-frontend
    ports:
      - "3000:80"
    command:
      - /bin/sh
      - -c
      - |
        echo "=================================================="
        echo "PneumoScan frontend available: http://localhost:3000"
        echo "Open this link in your browser after docker compose up"
        echo "=================================================="
        exec nginx -g 'daemon off;'
    depends_on:
      - backend
    restart: unless-stopped
